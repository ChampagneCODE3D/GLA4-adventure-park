services:
  - type: web
    name: adventure-park-booking
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: EMAIL_TO
        sync: false
